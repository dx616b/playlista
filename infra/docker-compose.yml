services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: backend/api/Dockerfile
    env_file:
      - ../.env
    environment:
      PYTHONPATH: /app
    volumes:
      - ..:/app
      - /srv:/srv:ro
      - /mnt:/mnt:ro
      - /media:/media:ro
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ..
      dockerfile: backend/worker/Dockerfile
    env_file:
      - ../.env
    environment:
      PYTHONPATH: /app
    volumes:
      - ..:/app
      - ${MUSIC_ROOT:-/tmp/music}:${MUSIC_ROOT:-/tmp/music}:ro
      - /srv:/srv:ro
      - /mnt:/mnt:ro
      - /media:/media:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ui:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ../frontend:/usr/share/nginx/html:ro
    depends_on:
      - api

volumes:
  postgres_data:
